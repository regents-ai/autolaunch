app = "autolaunch-mainnet"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_SERVER = "true"
  PHX_HOST = "autolaunch-mainnet.fly.dev"
  PORT = "8080"
  AUTOLAUNCH_CHAIN_ID = "8453"
  REGENT_STAKING_CHAIN_ID = "8453"
  REGENT_STAKING_CHAIN_LABEL = "Base"
  AUTOLAUNCH_CCA_FACTORY_ADDRESS = "0xCCccCcCAE7503Cac057829BF2811De42E16e0bD5"
  AUTOLAUNCH_USDC_ADDRESS = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
  AUTOLAUNCH_UNISWAP_V4_POOL_MANAGER = "0x498581fF718922c3f8e6A244956aF099B2652b2b"
  AUTOLAUNCH_UNISWAP_V4_POSITION_MANAGER = "0x7C5f5A4bBd8fD63184577525326123B519429bDc"
  REGENT_REVENUE_STAKING_ADDRESS = "0xb027Dc261636E30Cbc0fE25b2F8e1ed273354AB5"
  AUTOLAUNCH_DEPLOY_WORKDIR = "/app/contracts"
  AUTOLAUNCH_DEPLOY_BINARY = "forge"
  AUTOLAUNCH_DEPLOY_SCRIPT_TARGET = "scripts/ExampleCCADeploymentScript.s.sol:ExampleCCADeploymentScript"
  AUTOLAUNCH_DEPLOY_TIMEOUT_MS = "180000"
  AUTOLAUNCH_MOCK_DEPLOY = "false"
  CCA_CLAIM_BLOCK_OFFSET = "0"
  WORLD_ID_ACTION = "agentbook-registration"
  WORLD_ID_TTL_SECONDS = "300"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048
