              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/auctions/{id}/bids:
    post:
      operationId: createAuctionBid
      tags: [market]
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      requestBody:
        required: true
