    post:
      operationId: agentPrepareBidirectionalEnsLink
      tags: [ens]
      security: [{ AgentSiwaHeaders: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Bidirectional prepare result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

components:
  securitySchemes:
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
    AgentSessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-siwa-receipt
      description: >
        Signed Agent account header bundle for authenticated agent requests. The current
        shape includes the receipt, signature, signature-input, key ID, timestamp, wallet,
        chain, registry address, token ID, and content digest when the request has a body.
    AutolaunchInternalSignature:
      type: apiKey
      in: header
      name: x-autolaunch-signature
      description: >
        Versioned HMAC-SHA256 signature for internal Autolaunch worker calls.
        The signed payload is timestamp, HTTP method, request path with query,
        and SHA-256 digest of the raw request body, joined by newlines. The
        header value uses the shape `v1=<lowercase hex signature>`.
    AutolaunchInternalTimestamp:
      type: apiKey
      in: header
      name: x-autolaunch-timestamp
      description: Unix timestamp in seconds for the signed internal request.
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema: { type: string }
    PlanId:
      name: id
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: id
      in: path
      required: true
      schema: { type: string }
    AuctionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    BidId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SubjectId:
      name: id
      in: path
      required: true
      schema: { type: string }
    TokenAddress:
      name: token
      in: path
      required: true
      schema: { $ref: "#/components/schemas/Address" }
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    AgentPairingSessionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    Resource:
      name: resource
      in: path
      required: true
      schema: { type: string }
      description: >
        Canonical contract scope. Job-scoped settlement actions use `strategy`, `auction`,
        `revenue_splitter`, `fee_registry`, `fee_vault`, `hook`, and `vesting`.
        Launch treasury fee pulls use `revenue_splitter`, not `fee_vault`.
    Action:
      name: action
      in: path
      required: true
      schema: { type: string }
      description: >
        Canonical contract action. Settlement actions include `migrate`,
        `recover_failed_auction`, `sweep_currency`, `sweep_unsold_tokens`,
        `accept_ownership`, `sweep_token`, `release`, and `pull_treasury_share`.
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    PairingCode:
      type: string
      pattern: "^AL-[A-Z2-9]{6}-[A-Z2-9]{8}$"
    AddressOrEnsName:
      type: string
      description: Wallet address or ENS name that resolves to a wallet address.
    AutolaunchChainId:
      type: integer
      enum: [84532, 8453]
    DecimalString:
      type: string
    DateTime:
      type: string
      format: date-time
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    WalletAction:
      type: object
      additionalProperties: false
      required: [action_id, owner_product, resource, resource_id, action, chain_id, to, value, data, expected_signer, expires_at, idempotency_key, simulation, risk_copy]
      properties:
        action_id: { type: string }
        owner_product:
          type: string
          enum: [autolaunch]
        resource: { type: string }
        resource_id: { type: string }
        action: { type: string }
        chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        to: { $ref: "#/components/schemas/Address" }
        value:
          type: string
          pattern: "^[0-9]+$"
        data: { $ref: "#/components/schemas/HexData" }
        expected_signer: { $ref: "#/components/schemas/Address" }
        expires_at: { $ref: "#/components/schemas/DateTime" }
        idempotency_key: { type: string }
        simulation:
          type: object
          additionalProperties: false
          required: [required, status]
          properties:
            required: { type: boolean }
            status:
              type: string
              enum: [not_required, pending, passed, failed]
            block_number:
              anyOf:
                - { type: integer, minimum: 0 }
                - { type: "null" }
        risk_copy: { type: string }
    LooseObject:
      type: object
      additionalProperties: true
    AgentPairingStatus:
      type: string
      enum: [pending, completed, expired]
    AgentPairingAgent:
      type: object
      required: [agent_id, agent_wallet_address, agent_chain_id, agent_registry_address, agent_token_id, connected_at]
      properties:
        agent_id: { type: string }
        agent_wallet_address: { $ref: "#/components/schemas/Address" }
        agent_chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        agent_registry_address: { $ref: "#/components/schemas/Address" }
        agent_token_id: { type: string }
        agent_label:
          anyOf:
            - { type: string }
            - { type: "null" }
        connected_at: { $ref: "#/components/schemas/DateTime" }
      additionalProperties: false
    AgentPairingSession:
      type: object
      required: [session_id, status, challenge_nonce, challenge_message, expires_at, inserted_at, updated_at, agent]
      properties:
        session_id: { type: string }
        status: { $ref: "#/components/schemas/AgentPairingStatus" }
        pairing_code:
          anyOf:
            - { $ref: "#/components/schemas/PairingCode" }
            - { type: "null" }
        challenge_nonce: { type: string }
        challenge_message: { type: string }
        expires_at: { $ref: "#/components/schemas/DateTime" }
        completed_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        inserted_at: { $ref: "#/components/schemas/DateTime" }
        updated_at: { $ref: "#/components/schemas/DateTime" }
        agent:
          anyOf:
            - { $ref: "#/components/schemas/AgentPairingAgent" }
            - { type: "null" }
      additionalProperties: false
    AgentPairingSessionEnvelope:
      type: object
      required: [ok, session]
      properties:
        ok: { type: boolean, enum: [true] }
        session: { $ref: "#/components/schemas/AgentPairingSession" }
      additionalProperties: false
    AgentPairingCompleteRequest:
      type: object
      required:
        - pairing_code
        - challenge_message
        - agent_wallet_address
        - agent_chain_id
        - agent_registry_address
        - agent_token_id
        - signature_type
        - signature
        - signed_at
      properties:
        pairing_code: { $ref: "#/components/schemas/PairingCode" }
        challenge_message: { type: string }
        agent_wallet_address: { $ref: "#/components/schemas/Address" }
        agent_chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        agent_registry_address: { $ref: "#/components/schemas/Address" }
        agent_token_id: { type: string }
        agent_label:
          anyOf:
            - { type: string }
            - { type: "null" }
        signature_type:
          type: string
          enum: [evm_personal_sign]
        signature: { $ref: "#/components/schemas/HexData" }
        signed_at: { $ref: "#/components/schemas/DateTime" }
      additionalProperties: false
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok: { type: boolean, enum: [false] }
        error:
          type: object
          required: [code, product, status, path, request_id, message]
          properties:
            code: { type: string }
            product: { type: string, enum: [autolaunch] }
            status: { type: integer }
            path: { type: string }
            request_id: { type: string, nullable: true }
            message: { type: string }
            next_steps: { type: string, nullable: true }
          additionalProperties: true
      additionalProperties: false
    RateLimitedError:
      allOf:
        - { $ref: "#/components/schemas/ErrorEnvelope" }
        - type: object
          properties:
            error:
              type: object
              required: [code, message, retry_after_ms]
              properties:
                code: { type: string, enum: [rate_limited] }
                message: { type: string }
                retry_after_ms: { type: integer, minimum: 1 }
              additionalProperties: false
    HealthResponse:
      type: object
      required: [ok, service]
      properties:
        ok: { type: boolean, enum: [true] }
        service: { type: string, enum: [autolaunch] }
      additionalProperties: false
    InternalXmtpRoom:
      type: object
      required: [id, room_key, xmtp_group_id, name, status, presence_ttl_seconds, capacity]
      properties:
        id: { type: integer }
        room_key: { type: string }
        xmtp_group_id:
          anyOf:
            - { type: string }
            - { type: "null" }
        name: { type: string }
        status: { type: string }
        presence_ttl_seconds: { type: integer }
        capacity: { type: integer, enum: [200] }
      additionalProperties: false
    InternalXmtpRoomShard:
      allOf:
        - { $ref: "#/components/schemas/InternalXmtpRoom" }
        - type: object
          required: [active_members, joinable]
          properties:
            active_members: { type: integer }
            joinable: { type: boolean }
          additionalProperties: false
    InternalXmtpEnsureRoomRequest:
      type: object
      required: [room_key, name]
      properties:
        room_key: { type: string }
        xmtp_group_id: { type: string }
        name: { type: string }
        status: { type: string }
        presence_ttl_seconds: { type: integer }
        capacity: { type: integer, enum: [200] }
      additionalProperties: false
    InternalXmtpMessageIngestRequest:
      type: object
      required: [room_key, xmtp_message_id, sender_inbox_id, sender_type, body, sent_at]
      properties:
        room_key: { type: string }
        xmtp_message_id: { type: string }
        sender_inbox_id: { type: string }
        sender_wallet_address: { type: string }
        sender_label: { type: string }
        sender_type:
          type: string
          enum: [human, agent, system]
        body: { type: string }
        sent_at: { type: string, format: date-time }
        raw_payload: { type: object }
        moderation_state: { type: string }
        reply_to_message_id: { type: integer }
        reactions: { type: object }
      additionalProperties: false
    InternalXmtpMembershipCommand:
      type: object
      required: [id, op, xmtp_inbox_id]
      properties:
        id: { type: integer }
        op:
          type: string
          enum: [add_member, remove_member]
        xmtp_inbox_id: { type: string }
      additionalProperties: false
    PrivySessionCsrf:
      type: object
      required: [ok, csrf_token]
      properties:
        ok: { type: boolean, enum: [true] }
        csrf_token: { type: string }
      additionalProperties: false
    PrivySessionRequest:
      type: object
      required: [wallet_address, wallet_addresses]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        wallet_addresses:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Address" }
        display_name:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrivyXmtpCompleteRequest:
      type: object
      required: [wallet_address, client_id, signature_request_id, signature]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        client_id: { type: string }
        signature_request_id: { type: string }
        signature: { $ref: "#/components/schemas/HexData" }
      additionalProperties: false
    PrivySessionResponse:
      type: object
      required: [ok, human, xmtp]
      properties:
        ok: { type: boolean, enum: [true] }
        human:
          anyOf:
            - type: object
              required: [id, privy_user_id, wallet_address, wallet_addresses, role, xmtp_inbox_id]
              properties:
                id: { type: integer }
                privy_user_id: { type: string }
                wallet_address: { $ref: "#/components/schemas/Address" }
                wallet_addresses:
                  type: array
                  items: { $ref: "#/components/schemas/Address" }
                display_name:
                  anyOf:
                    - { type: string }
                    - { type: "null" }
                role: { type: string }
                xmtp_inbox_id:
                  anyOf:
                    - { type: string }
                    - { type: "null" }
              additionalProperties: false
            - { type: "null" }
        xmtp:
          anyOf:
            - { type: "null" }
            - type: object
              required: [status, inbox_id, wallet_address]
              properties:
                status: { type: string, enum: [ready] }
                inbox_id: { type: string }
                wallet_address: { $ref: "#/components/schemas/Address" }
              additionalProperties: false
            - type: object
              required: [status, inbox_id, wallet_address, client_id, signature_request_id, signature_text]
              properties:
                status: { type: string, enum: [signature_required] }
                inbox_id: { type: "null" }
                wallet_address: { $ref: "#/components/schemas/Address" }
                client_id: { type: string }
                signature_request_id: { type: string }
                signature_text: { type: string }
              additionalProperties: false
      additionalProperties: false
    EmptyRequest:
      type: object
      additionalProperties: false
    AmountRequest:
      type: object
      required: [amount]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    StakeRequest:
      type: object
      required: [amount]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
        receiver: { $ref: "#/components/schemas/AddressOrEnsName" }
      additionalProperties: false
    ExistingTokenRevenueSubjectRequest:
      type: object
      required: [stake_token, treasury, staker_pool_bps, label]
      properties:
        stake_token: { $ref: "#/components/schemas/Address" }
        treasury: { $ref: "#/components/schemas/Address" }
        staker_pool_bps: { type: integer, minimum: 0, maximum: 10000 }
        label: { type: string, minLength: 1 }
        salt: { $ref: "#/components/schemas/HexData" }
      additionalProperties: false
    DeferredAutolaunchRequest:
      type: object
      required: [token_name, token_symbol, total_supply, treasury, token_factory, subject_label]
      properties:
        token_name: { type: string, minLength: 1 }
        token_symbol: { type: string, minLength: 1 }
        total_supply: { type: string, minLength: 1 }
        treasury: { $ref: "#/components/schemas/Address" }
        token_factory: { $ref: "#/components/schemas/Address" }
        token_factory_data: { $ref: "#/components/schemas/HexData" }
        token_factory_salt: { $ref: "#/components/schemas/HexData" }
        subject_label: { type: string, minLength: 1 }
        identity_chain_id:
          anyOf:
            - { type: integer, minimum: 1 }
            - { type: "null" }
        identity_registry:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        identity_agent_id:
          anyOf:
            - { type: integer, minimum: 1 }
            - { type: "null" }
      additionalProperties: false
    ConfirmRevenueSubjectRequest:
      type: object
      required: [tx_hash]
      properties:
        tx_hash: { $ref: "#/components/schemas/HexData" }
      additionalProperties: false
    RegentStakingDepositPrepareRequest:
      type: object
      required: [amount, source_tag, source_ref]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
        source_tag: { type: string }
        source_ref: { type: string }
      additionalProperties: false
    RegentStakingTreasuryWithdrawPrepareRequest:
      type: object
      required: [amount]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
        recipient:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
      additionalProperties: false
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    AgentSessionResponse:
      type: object
      required: [ok, session]
      properties:
        ok: { type: boolean, enum: [true] }
        session:
          anyOf:
            - type: object
              required: [session_id, audience, wallet_address, chain_id, registry_address, token_id, issued_at, expires_at]
              properties:
                session_id: { type: string }
                audience: { type: string, enum: [autolaunch] }
                wallet_address: { $ref: "#/components/schemas/Address" }
                chain_id: { type: string }
                registry_address: { $ref: "#/components/schemas/Address" }
                token_id: { type: string }
                issued_at: { $ref: "#/components/schemas/DateTime" }
                expires_at: { $ref: "#/components/schemas/DateTime" }
              additionalProperties: false
            - { type: "null" }
      additionalProperties: false
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PreparedAction:
      type: object
      required:
        - action_id
        - resource
        - resource_id
        - action
        - chain_id
        - expected_signer
        - expires_at
        - idempotency_key
        - risk_copy
        - wallet_action
      properties:
        action_id: { type: string }
        resource: { type: string }
        resource_id: { type: string }
        action: { type: string }
        chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        expected_signer: { $ref: "#/components/schemas/Address" }
        expires_at: { $ref: "#/components/schemas/DateTime" }
        idempotency_key: { type: string }
        risk_copy: { type: string }
        wallet_action:
          $ref: "#/components/schemas/WalletAction"
      additionalProperties: true
    PreparedActionEnvelope:
      type: object
      required: [ok, prepared]
      properties:
        ok: { type: boolean, enum: [true] }
        job_id: { type: string }
        subject_id: { type: string }
        prepared:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: false
    PreparedRevenueSubjectActionEnvelope:
      type: object
      required: [ok, prepared]
      properties:
        ok: { type: boolean, enum: [true] }
        subject:
          anyOf:
            - { $ref: "#/components/schemas/RevenueSubject" }
            - { type: "null" }
        prepared:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: false
    RegentStakingPreparedActionEnvelope:
      type: object
      required: [ok, prepared]
      properties:
        ok: { type: boolean, enum: [true] }
        staking:
          anyOf:
            - type: object
              additionalProperties: true
            - { type: "null" }
        prepared:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: false
    SupportingEvidence:
      type: object
      required: [kind, label, ref, source]
      properties:
        kind: { type: string, enum: [techtree_evidence_packet] }
        label: { type: string }
        ref: { type: string }
        source: { type: string, enum: [techtree] }
      additionalProperties: false
    AgentReadinessEnvelope:
      type: object
      required:
        [
          ok,
          agent_id,
          launch_eligible,
          launch_blockers,
          supported_chains,
          readiness,
          supporting_evidence,
        ]
      properties:
        ok: { type: boolean, enum: [true] }
        agent_id: { type: string }
        agent_name:
          anyOf:
            - { type: string }
            - { type: "null" }
        launch_eligible: { type: boolean }
        launch_blockers:
          type: array
          items: { type: string }
        existing_token:
          anyOf:
            - type: object
              additionalProperties: true
            - { type: "null" }
        supported_chains:
          type: array
          items: { type: string }
        readiness:
          type: object
          additionalProperties: true
        supporting_evidence:
          type: array
          items: { $ref: "#/components/schemas/SupportingEvidence" }
      additionalProperties: true
    PrelaunchMetadataDraft:
      type: object
      properties:
        title:
          anyOf:
            - { type: string }
            - { type: "null" }
        subtitle:
          anyOf:
            - { type: string }
            - { type: "null" }
        description:
          anyOf:
            - { type: string }
            - { type: "null" }
        website_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_asset_id:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrelaunchPlan:
      type: object
      required:
        - plan_id
        - agent_id
        - token_name
        - token_symbol
        - agent_safe_address
        - minimum_raise_usdc
        - minimum_raise_usdc_raw
