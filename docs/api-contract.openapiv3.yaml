        - $ref: "#/components/parameters/Resource"
        - $ref: "#/components/parameters/Action"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Prepared subject contract action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedActionEnvelope" }
  /api/contracts/admin/{resource}/{action}/prepare:
    post:
      operationId: prepareAdminContractAction
      tags: [contracts]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Resource"
        - $ref: "#/components/parameters/Action"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Prepared admin contract action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedActionEnvelope" }
components:
  securitySchemes:
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema: { type: string }
    PlanId:
      name: id
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: id
      in: path
      required: true
      schema: { type: string }
    AuctionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    BidId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SubjectId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    Resource:
      name: resource
      in: path
      required: true
      schema: { type: string }
    Action:
      name: action
      in: path
      required: true
      schema: { type: string }
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    DecimalString:
      type: string
    DateTime:
      type: string
      format: date-time
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    LooseObject:
      type: object
      additionalProperties: true
    EmptyRequest:
      type: object
      additionalProperties: false
    AmountRequest:
      type: object
      required: [amount]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PreparedAction:
      type: object
      properties:
        resource: { type: string }
        action: { type: string }
        chain_id: { type: integer }
        target: { $ref: "#/components/schemas/Address" }
        calldata: { $ref: "#/components/schemas/HexData" }
        tx_request:
          $ref: "#/components/schemas/TxRequest"
      additionalProperties: true
    PreparedActionEnvelope:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: true
    TxRequest:
      type: object
      required: [chain_id, to, value, data]
      properties:
        chain_id: { type: integer }
        to: { $ref: "#/components/schemas/Address" }
        value: { $ref: "#/components/schemas/HexData" }
        data: { $ref: "#/components/schemas/HexData" }
      additionalProperties: false
    PrelaunchMetadataDraft:
      type: object
      properties:
        title:
          anyOf:
            - { type: string }
            - { type: "null" }
        subtitle:
          anyOf:
            - { type: string }
            - { type: "null" }
        description:
          anyOf:
            - { type: string }
            - { type: "null" }
        website_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_asset_id:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrelaunchPlan:
      type: object
      required:
        - plan_id
        - agent_id
        - token_name
        - token_symbol
        - treasury_safe_address
        - auction_proceeds_recipient
        - ethereum_revenue_treasury
        - minimum_raise_usdc
        - minimum_raise_usdc_raw
      properties:
        plan_id: { type: string }
        agent_id: { type: string }
        token_name: { type: string }
        token_symbol: { type: string }
        treasury_safe_address: { $ref: "#/components/schemas/Address" }
        auction_proceeds_recipient: { $ref: "#/components/schemas/Address" }
        ethereum_revenue_treasury: { $ref: "#/components/schemas/Address" }
        backup_safe_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        metadata_draft:
          anyOf:
            - { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
        minimum_raise_usdc_raw: { type: string }
        status:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    PrelaunchPlanUpsertRequest:
      type: object
      required:
        - agent_id
        - token_name
        - token_symbol
        - treasury_safe_address
        - auction_proceeds_recipient
        - ethereum_revenue_treasury
        - minimum_raise_usdc
      properties:
        agent_id: { type: string }
        token_name: { type: string }
        token_symbol: { type: string }
        treasury_safe_address: { $ref: "#/components/schemas/Address" }
        auction_proceeds_recipient: { $ref: "#/components/schemas/Address" }
        ethereum_revenue_treasury: { $ref: "#/components/schemas/Address" }
        backup_safe_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        metadata_draft:
          anyOf:
            - { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    PrelaunchPlanEnvelope:
      type: object
      required: [ok, plan]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
      additionalProperties: false
    PrelaunchPlanListEnvelope:
      type: object
      required: [ok, items]
      properties:
        ok: { type: boolean, enum: [true] }
        items:
          type: array
          items: { $ref: "#/components/schemas/PrelaunchPlan" }
      additionalProperties: false
    PrelaunchValidation:
      type: object
      properties:
        launchable: { type: boolean }
      additionalProperties: true
    PrelaunchPlanValidationEnvelope:
      type: object
      required: [ok, plan, validation]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
        validation: { $ref: "#/components/schemas/PrelaunchValidation" }
      additionalProperties: false
    LaunchPlanRequest:
      type: object
      required: [wallet_address, nonce, message, signature, issued_at]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        nonce: { type: string }
        message: { type: string }
        signature: { type: string }
        issued_at: { $ref: "#/components/schemas/DateTime" }
      additionalProperties: false
    LaunchRef:
      type: object
      properties:
        job_id: { type: string }
      additionalProperties: true
    LaunchPlanEnvelope:
      type: object
      required: [ok, plan, launch]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
        launch: { $ref: "#/components/schemas/LaunchRef" }
      additionalProperties: false
    PrelaunchAssetUploadRequest:
      type: object
      properties:
        source_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        file_name:
          anyOf:
            - { type: string }
            - { type: "null" }
        media_type:
          anyOf:
            - { type: string }
            - { type: "null" }
        content_base64:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrelaunchAsset:
      type: object
      properties:
        asset_id: { type: string }
        public_url: { type: string }
      additionalProperties: true
    PrelaunchAssetEnvelope:
      type: object
      required: [ok, asset]
      properties:
        ok: { type: boolean, enum: [true] }
        asset: { $ref: "#/components/schemas/PrelaunchAsset" }
      additionalProperties: false
    PrelaunchMetadataRequest:
      type: object
      required: [metadata]
      properties:
        metadata: { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
      additionalProperties: false
    PrelaunchMetadataPreviewEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
        html:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    LaunchPreviewRequest:
      type: object
      required:
        - agent_id
        - chain_id
        - token_name
        - token_symbol
        - recovery_safe_address
        - auction_proceeds_recipient
        - ethereum_revenue_treasury
        - total_supply
        - minimum_raise_usdc
      properties:
        agent_id: { type: string }
        chain_id: { type: integer }
        token_name: { type: string }
        token_symbol: { type: string }
        recovery_safe_address: { $ref: "#/components/schemas/Address" }
        auction_proceeds_recipient: { $ref: "#/components/schemas/Address" }
        ethereum_revenue_treasury: { $ref: "#/components/schemas/Address" }
        total_supply: { type: string }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    LaunchPreviewEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    LaunchCreateRequest:
      allOf:
        - $ref: "#/components/schemas/LaunchPreviewRequest"
        - type: object
          required: [wallet_address, nonce, message, signature, issued_at]
          properties:
            wallet_address: { $ref: "#/components/schemas/Address" }
            nonce: { type: string }
            message: { type: string }
            signature: { type: string }
            issued_at: { $ref: "#/components/schemas/DateTime" }
          additionalProperties: false
    LaunchJob:
      type: object
      properties:
        job_id: { type: string }
        status:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    LaunchJobEnvelope:
      type: object
      required: [ok, job]
      properties:
        ok: { type: boolean, enum: [true] }
        job: { $ref: "#/components/schemas/LaunchJob" }
      additionalProperties: true
    AuctionTrustErc8004:
      type: object
      required: [connected, agent_id, token_id, chain_id]
      properties:
        connected: { type: boolean, enum: [true] }
        agent_id: { type: string }
        token_id: { type: string }
        chain_id: { type: integer }
        registry_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        web_endpoint:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_url:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    AuctionTrustEns:
      type: object
      required: [connected, name]
      properties:
        connected: { type: boolean }
        name:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    AuctionTrustWorld:
      type: object
      required: [connected, network, human_id, launch_count]
      properties:
        connected: { type: boolean }
        network: { type: string }
        human_id:
          anyOf:
            - { type: string }
            - { type: "null" }
        launch_count: { type: integer, minimum: 0 }
      additionalProperties: false
    AuctionTrustX:
      type: object
      required: [connected, handle, profile_url, verified_at]
      properties:
        connected: { type: boolean }
        handle:
          anyOf:
            - { type: string }
            - { type: "null" }
        profile_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        verified_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
      additionalProperties: false
    AuctionTrust:
      type: object
      description: >
        Canonical nested trust summary shared by auction payloads and direct trust reads.
        Do not flatten these fields back into older top-level flags.
      required: [erc8004, ens, world, x]
      properties:
        erc8004: { $ref: "#/components/schemas/AuctionTrustErc8004" }
        ens: { $ref: "#/components/schemas/AuctionTrustEns" }
        world: { $ref: "#/components/schemas/AuctionTrustWorld" }
        x: { $ref: "#/components/schemas/AuctionTrustX" }
      additionalProperties: false
    AuctionSummary:
      type: object
      required:
        - id
        - agent_id
        - agent_name
        - symbol
        - chain
        - chain_id
        - status
        - current_clearing_price
        - total_bid_volume
        - bidders
        - trust
      properties:
        id: { type: string }
        agent_id: { type: string }
        agent_name: { type: string }
        symbol: { type: string }
        owner_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        auction_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        token_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        network: { type: string }
        chain: { type: string }
        chain_family:
          anyOf:
            - { type: string }
            - { type: "null" }
        chain_id: { type: integer }
        status: { type: string }
        phase:
          anyOf:
            - { type: string, enum: [biddable, live] }
            - { type: "null" }
        auction_outcome:
          anyOf:
            - { type: string, enum: [active, graduated, failed_minimum, settled] }
            - { type: "null" }
        started_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        ends_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        claim_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        bidders: { type: integer, minimum: 0 }
        raised_currency:
          anyOf:
            - { type: string }
            - { type: "null" }
        currency_raised_raw:
          anyOf:
            - { type: string }
            - { type: "null" }
        currency_raised:
          anyOf:
            - { $ref: "#/components/schemas/DecimalString" }
            - { type: "null" }
        required_currency_raised_raw:
          anyOf:
            - { type: string }
            - { type: "null" }
        required_currency_raised:
          anyOf:
            - { $ref: "#/components/schemas/DecimalString" }
            - { type: "null" }
        minimum_raise_progress_percent:
          anyOf:
            - { type: integer, minimum: 0 }
            - { type: "null" }
        minimum_raise_met:
          anyOf:
            - { type: boolean }
            - { type: "null" }
        is_graduated:
          anyOf:
            - { type: boolean }
            - { type: "null" }
        projected_final_currency_raised_raw:
          anyOf:
            - { type: string }
            - { type: "null" }
        projected_final_currency_raised:
          anyOf:
            - { $ref: "#/components/schemas/DecimalString" }
            - { type: "null" }
        projection_basis:
          anyOf:
            - { type: string, enum: [simple_pace] }
            - { type: "null" }
        time_remaining_seconds:
          anyOf:
            - { type: integer, minimum: 0 }
            - { type: "null" }
        returns_enabled:
          anyOf:
            - { type: boolean }
            - { type: "null" }
        target_currency:
          anyOf:
            - { type: string }
            - { type: "null" }
        progress_percent:
          anyOf:
            - { type: integer }
            - { type: "null" }
        metrics_updated_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        metrics_source:
          anyOf:
            - { type: string }
            - { type: "null" }
        quote_mode:
          anyOf:
            - { type: string }
            - { type: "null" }
        current_clearing_price: { type: string }
        current_price_usdc:
          anyOf:
            - { type: string }
            - { type: "null" }
        implied_market_cap_usdc:
          anyOf:
            - { type: string }
            - { type: "null" }
        price_source:
          anyOf:
            - { type: string }
            - { type: "null" }
        total_bid_volume: { type: string }
        notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        uniswap_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        trust: { $ref: "#/components/schemas/AuctionTrust" }
        completion_plan:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        reputation_prompt:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        your_bid_status:
          anyOf:
            - { type: string }
            - { type: "null" }
        detail_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        subject_url:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    AuctionListEnvelope:
      type: object
      description: >
        Auction list responses use `items`, not the older generic `data` array shape.
      required: [ok, items, generated_at]
      properties:
        ok: { type: boolean, enum: [true] }
        items:
          type: array
          items: { $ref: "#/components/schemas/AuctionSummary" }
        generated_at: { $ref: "#/components/schemas/DateTime" }
      additionalProperties: false
    AuctionEnvelope:
      type: object
      required: [ok, auction]
      properties:
        ok: { type: boolean, enum: [true] }
        auction: { $ref: "#/components/schemas/AuctionSummary" }
      additionalProperties: false
    AuctionReturnsEnvelope:
      type: object
      required: [ok, items]
      properties:
        ok: { type: boolean, enum: [true] }
        items:
          type: array
          items: { $ref: "#/components/schemas/AuctionSummary" }
        next_cursor:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    AuctionBidQuoteRequest:
      type: object
      required: [amount, max_price]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
        max_price: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    AuctionBidQuote:
      type: object
      required:
        - auction_id
        - amount
        - max_price
        - current_clearing_price
        - projected_clearing_price
        - quote_mode
        - would_be_active_now
        - status_band
        - estimated_tokens_if_end_now
        - estimated_tokens_if_no_other_bids_change
        - inactive_above_price
        - time_remaining_seconds
        - warnings
      properties:
        auction_id: { type: string }
        amount: { $ref: "#/components/schemas/DecimalString" }
        max_price: { $ref: "#/components/schemas/DecimalString" }
        current_clearing_price: { $ref: "#/components/schemas/DecimalString" }
        projected_clearing_price: { $ref: "#/components/schemas/DecimalString" }
        quote_mode: { type: string }
        would_be_active_now: { type: boolean }
        status_band: { type: string }
        estimated_tokens_if_end_now: { $ref: "#/components/schemas/DecimalString" }
        estimated_tokens_if_no_other_bids_change: { $ref: "#/components/schemas/DecimalString" }
        inactive_above_price: { $ref: "#/components/schemas/DecimalString" }
        time_remaining_seconds: { type: integer, minimum: 0 }
        warnings:
          type: array
          items: { type: string }
        tx_request:
          anyOf:
            - { $ref: "#/components/schemas/TxRequest" }
            - { type: "null" }
      additionalProperties: false
    AuctionBidQuoteEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    CreateAuctionBidRequest:
      type: object
      required: [amount, max_price]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
        max_price: { $ref: "#/components/schemas/DecimalString" }
        tx_hash:
          anyOf:
            - { type: string }
            - { type: "null" }
