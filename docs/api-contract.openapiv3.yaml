  /api/auctions/{id}/bid_quote:
    post:
      operationId: quoteAuctionBid
      tags: [market]
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Bid quote
          content:
