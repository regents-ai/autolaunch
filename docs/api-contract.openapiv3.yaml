          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/ens/link/plan:
    post:
      operationId: planEnsLink
      tags: [ens]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: ENS link plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/ens/link/prepare-ensip25:
    post:
      operationId: prepareEnsip25Link
      tags: [ens]
      requestBody:
        required: true
