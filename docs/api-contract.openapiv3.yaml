      operationId: getContractsSubjectOverview
      tags: [contracts]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      responses:
        "200":
          description: Subject contracts overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/contracts/jobs/{id}/{resource}/{action}/prepare:
    post:
      operationId: prepareJobContractAction
      tags: [contracts]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/Resource"
        - $ref: "#/components/parameters/Action"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Prepared job contract action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedActionEnvelope" }
  /api/contracts/subjects/{id}/{resource}/{action}/prepare:
    post:
      operationId: prepareSubjectContractAction
      tags: [contracts]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
        - $ref: "#/components/parameters/Resource"
        - $ref: "#/components/parameters/Action"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Prepared subject contract action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedActionEnvelope" }
  /api/contracts/admin/{resource}/{action}/prepare:
    post:
      operationId: prepareAdminContractAction
      tags: [contracts]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Resource"
        - $ref: "#/components/parameters/Action"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Prepared admin contract action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedActionEnvelope" }
components:
  securitySchemes:
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema: { type: string }
    PlanId:
      name: id
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: id
      in: path
      required: true
      schema: { type: string }
    AuctionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    BidId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SubjectId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    Resource:
      name: resource
      in: path
      required: true
      schema: { type: string }
    Action:
      name: action
      in: path
      required: true
      schema: { type: string }
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    LooseObject:
      type: object
      additionalProperties: true
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PreparedAction:
      type: object
      properties:
        resource: { type: string }
        action: { type: string }
        chain_id: { type: integer }
        target: { $ref: "#/components/schemas/Address" }
        calldata: { type: string }
        tx_request:
          type: object
          additionalProperties: true
      additionalProperties: true
    PreparedActionEnvelope:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: true
