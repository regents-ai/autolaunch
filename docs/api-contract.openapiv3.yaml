openapi: 3.1.0
info:
  title: Autolaunch API Contract
  version: 0.1.0
  description: >
    Source-of-truth HTTP contract for the live Autolaunch backend. This file owns
    Autolaunch launch, prelaunch, lifecycle, market, ENS, contracts, and AgentBook
    routes. Shared Regent staking lives in the shared Regent services contract instead.
tags:
  - name: health
  - name: auth
  - name: agentbook
  - name: launch
  - name: prelaunch
  - name: lifecycle
  - name: market
  - name: trust
  - name: subjects
  - name: ens
  - name: contracts
paths:
  /health:
    get:
      operationId: autolaunchHealth
      tags: [health]
      responses:
        "200":
          description: Health
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/agent/siwa/nonce:
    post:
      operationId: autolaunchSiwaNonce
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Nonce
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/agent/siwa/verify:
    post:
      operationId: autolaunchSiwaVerify
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/auth/privy/session:
    post:
      operationId: createPrivySession
      tags: [auth]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
    delete:
      operationId: deletePrivySession
      tags: [auth]
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkEnvelope" }

  /api/agentbook/sessions:
    post:
      operationId: createAgentbookSession
      tags: [agentbook]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/sessions/{id}:
    get:
      operationId: getAgentbookSession
      tags: [agentbook]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/sessions/{id}/submit:
    post:
      operationId: submitAgentbookSession
      tags: [agentbook]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Proof submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/lookup:
    get:
      operationId: lookupAgentbookRegistration
      tags: [agentbook]
      parameters:
        - name: agent_address
          in: query
          required: true
          schema: { $ref: "#/components/schemas/Address" }
        - name: network
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Lookup result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/verify:
    post:
      operationId: verifyAgentbookHeader
      tags: [agentbook]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/agents:
    get:
      operationId: listAgents
      tags: [launch]
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseListEnvelope" }
  /api/agents/{id}:
    get:
      operationId: getAgent
      tags: [launch]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agents/{id}/readiness:
    get:
      operationId: getAgentReadiness
      tags: [launch]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent readiness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/prelaunch/plans:
    get:
      operationId: listPrelaunchPlans
      tags: [prelaunch]
      responses:
        "200":
          description: Prelaunch plans
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanListEnvelope" }
    post:
      operationId: createPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrelaunchPlanUpsertRequest" }
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
  /api/prelaunch/plans/{id}:
    get:
      operationId: getPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Plan detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
    patch:
      operationId: updatePrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrelaunchPlanUpsertRequest" }
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
  /api/prelaunch/plans/{id}/validate:
    post:
      operationId: validatePrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanValidationEnvelope" }
  /api/prelaunch/plans/{id}/publish:
    post:
      operationId: publishPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Publish result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanValidationEnvelope" }
  /api/prelaunch/plans/{id}/launch:
    post:
      operationId: launchPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LaunchPlanRequest" }
      responses:
        "200":
          description: Launch started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LaunchPlanEnvelope" }
  /api/prelaunch/assets:
    post:
      operationId: uploadPrelaunchAsset
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrelaunchAssetUploadRequest" }
      responses:
        "200":
          description: Asset uploaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchAssetEnvelope" }
  /api/prelaunch/plans/{id}/metadata:
    post:
      operationId: savePrelaunchMetadata
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrelaunchMetadataRequest" }
      responses:
        "200":
          description: Metadata saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
  /api/prelaunch/plans/{id}/metadata-preview:
    get:
      operationId: getPrelaunchMetadataPreview
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Metadata preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchMetadataPreviewEnvelope" }

  /api/launch/preview:
    post:
      operationId: previewLaunch
      tags: [launch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LaunchPreviewRequest" }
      responses:
        "200":
          description: Launch preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LaunchPreviewEnvelope" }
  /api/launch/jobs:
    post:
      operationId: createLaunchJob
      tags: [launch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LaunchCreateRequest" }
      responses:
        "201":
          description: Launch job created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LaunchJobEnvelope" }
  /api/launch/jobs/{id}:
    get:
      operationId: getLaunchJob
      tags: [launch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Launch job
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LaunchJobEnvelope" }

  /api/lifecycle/jobs/{id}:
    get:
      operationId: getLifecycleJob
      tags: [lifecycle]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Lifecycle job detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/lifecycle/jobs/{id}/finalize/prepare:
    post:
      operationId: prepareFinalizeLaunch
      tags: [lifecycle]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Finalize prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/lifecycle/jobs/{id}/finalize/register:
    post:
      operationId: registerFinalizeLaunch
      tags: [lifecycle]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Finalize registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/lifecycle/jobs/{id}/vesting:
    get:
      operationId: getVestingStatus
      tags: [lifecycle]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Vesting status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/trust/agents/{id}:
    get:
      operationId: getAgentTrust
      tags: [trust]
      summary: Read one agent trust summary
      description: >
        Returns the canonical nested trust summary for one agent identity. This uses the same
        `trust.erc8004`, `trust.ens`, `trust.world`, and `trust.x` structure exposed inside
        auction payloads.
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent trust summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentTrustEnvelope" }
  /api/trust/x/start:
    post:
      operationId: startXLink
      tags: [trust]
      summary: Start the X-link browser flow
      description: >
        Starts the X-link flow for one agent identity and returns a relative `redirect_path`.
        CLI and web clients should open that path in the browser. They should not implement
        OAuth or provider handshakes themselves.
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/XLinkStartRequest" }
      responses:
        "200":
          description: X link start payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/XLinkStartEnvelope" }
  /api/trust/x/callback:
    post:
      operationId: completeXLink
      tags: [trust]
      summary: Save the completed X-link result
      description: >
        Completes the browser-owned X-link flow and stores the linked X handle under the agent's
        trust summary.
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/XLinkCallbackRequest" }
      responses:
        "200":
          description: X link saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentTrustEnvelope" }

  /api/auctions:
    get:
      operationId: listAuctions
      tags: [market]
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [biddable, live, all, failed_minimum]
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, oldest, market_cap_desc, market_cap_asc, failure_recent]
      responses:
        "200":
          description: Auctions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuctionListEnvelope" }
  /api/auction-returns:
    get:
      operationId: listAuctionReturns
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Failed auctions available for returns
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuctionReturnsEnvelope" }
  /api/auctions/{id}:
    get:
      operationId: getAuction
      tags: [market]
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      responses:
        "200":
          description: Auction detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuctionEnvelope" }
  /api/auctions/{id}/bid_quote:
    post:
      operationId: quoteAuctionBid
      tags: [market]
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuctionBidQuoteRequest" }
      responses:
        "200":
          description: Bid quote
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuctionBidQuoteEnvelope" }
  /api/auctions/{id}/bids:
    post:
      operationId: createAuctionBid
      tags: [market]
      parameters:
        - $ref: "#/components/parameters/AuctionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAuctionBidRequest" }
      responses:
        "201":
          description: Bid created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BidPositionEnvelope" }
  /api/me/bids:
    get:
      operationId: listMyBids
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - name: auction
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [active, borderline, inactive, claimable, exited, claimed, returnable]
      responses:
        "200":
          description: Current user's bids
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BidPositionListEnvelope" }
  /api/me/holdings:
    get:
      operationId: getMyHoldings
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      responses:
        "200":
          description: Current user's actionable holdings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HoldingsEnvelope" }
  /api/me/profile:
    get:
      operationId: getMyProfile
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      responses:
        "200":
          description: Current user's cached token profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileSnapshotEnvelope" }
  /api/me/profile/refresh:
    post:
      operationId: refreshMyProfile
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      responses:
        "200":
          description: Profile refresh started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfileSnapshotEnvelope" }
  /api/bids/{id}/exit:
    post:
      operationId: exitBid
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/BidId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BidMutationRequest" }
      responses:
        "200":
          description: Exit prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BidPositionEnvelope" }
  /api/bids/{id}/return-usdc:
    post:
      operationId: returnBidUsdc
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/BidId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BidMutationRequest" }
      responses:
        "200":
          description: Return prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BidPositionEnvelope" }
  /api/bids/{id}/claim:
    post:
      operationId: claimBid
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/BidId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BidMutationRequest" }
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BidPositionEnvelope" }

  /api/subjects/{id}:
    get:
      operationId: getSubject
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      responses:
        "200":
          description: Subject detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubjectEnvelope" }
  /api/subjects/{id}/ingress:
    get:
      operationId: getSubjectIngress
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      responses:
        "200":
          description: Subject ingress
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SubjectIngressEnvelope" }
  /api/subjects/{id}/stake:
    post:
      operationId: stakeSubject
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AmountRequest" }
      responses:
        "200":
          description: Stake prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedSubjectActionEnvelope" }
  /api/subjects/{id}/unstake:
    post:
      operationId: unstakeSubject
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AmountRequest" }
      responses:
        "200":
          description: Unstake prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedSubjectActionEnvelope" }
  /api/subjects/{id}/claim-usdc:
    post:
      operationId: claimSubjectUsdc
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedSubjectActionEnvelope" }
  /api/subjects/{id}/claim-emissions:
    post:
      operationId: claimSubjectEmissions
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: Emissions claim prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedSubjectActionEnvelope" }
  /api/subjects/{id}/claim-and-stake-emissions:
    post:
      operationId: claimAndStakeSubjectEmissions
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: Emissions compound prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedSubjectActionEnvelope" }
  /api/subjects/{id}/ingress/{address}/sweep:
    post:
      operationId: sweepSubjectIngress
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
        - name: address
          in: path
          required: true
          schema: { $ref: "#/components/schemas/Address" }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: Sweep prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreparedSubjectActionEnvelope" }

  /api/ens/link/plan:
    post:
      operationId: planEnsLink
      tags: [ens]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: ENS link plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/ens/link/prepare-ensip25:
    post:
      operationId: prepareEnsip25Link
      tags: [ens]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: ENSIP-25 prepare result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/ens/link/prepare-erc8004:
    post:
      operationId: prepareErc8004Link
      tags: [ens]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: ERC-8004 prepare result
