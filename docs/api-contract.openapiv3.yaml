        plan_id: { type: string }
        agent_id: { type: string }
        token_name: { type: string }
        token_symbol: { type: string }
        agent_safe_address: { $ref: "#/components/schemas/Address" }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        metadata_draft:
          anyOf:
            - { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
            - { type: "null" }
        techtree_evidence_packet_ref:
          anyOf:
            - { type: string }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
        minimum_raise_usdc_raw: { type: string }
        status:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    PrelaunchPlanUpsertRequest:
      type: object
      required:
        - agent_id
        - token_name
        - token_symbol
        - agent_safe_address
        - minimum_raise_usdc
      properties:
        agent_id: { type: string }
        token_name: { type: string }
        token_symbol: { type: string }
        agent_safe_address: { $ref: "#/components/schemas/Address" }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        metadata_draft:
          anyOf:
            - { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
            - { type: "null" }
        techtree_evidence_packet_ref:
          anyOf:
            - { type: string }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    PrelaunchPlanEnvelope:
      type: object
      required: [ok, plan]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
      additionalProperties: false
    PrelaunchPlanListEnvelope:
      type: object
      required: [ok, items]
      properties:
        ok: { type: boolean, enum: [true] }
        items:
          type: array
          items: { $ref: "#/components/schemas/PrelaunchPlan" }
      additionalProperties: false
    PrelaunchValidation:
      type: object
      properties:
        launchable: { type: boolean }
      additionalProperties: true
    PrelaunchPlanValidationEnvelope:
      type: object
      required: [ok, plan, validation]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
        validation: { $ref: "#/components/schemas/PrelaunchValidation" }
      additionalProperties: false
    LaunchPlanRequest:
      type: object
      required: [wallet_address, registry_address, token_id, nonce, message, signature, issued_at]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        registry_address: { $ref: "#/components/schemas/Address" }
        token_id: { type: string }
        nonce: { type: string }
