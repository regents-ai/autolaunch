      required: [ok, holdings]
      properties:
        ok: { type: boolean, enum: [true] }
        holdings: { $ref: "#/components/schemas/Holdings" }
      additionalProperties: false
    AgentTrustEnvelope:
      type: object
      required: [ok, agent_id, trust]
      properties:
        ok: { type: boolean, enum: [true] }
        agent_id: { type: string }
        trust: { $ref: "#/components/schemas/AuctionTrust" }
      additionalProperties: false
    XLinkStartRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id: { type: string }
      additionalProperties: false
    XLinkStartEnvelope:
      type: object
      required: [ok, provider, trust_provider, agent_id, redirect_path]
      properties:
        ok: { type: boolean, enum: [true] }
        provider: { type: string, example: twitter }
        trust_provider: { type: string, example: x }
        agent_id: { type: string }
        redirect_path:
          type: string
          description: Relative browser path returned by the backend for the X-link flow.
          example: /trust/x/redirect?token=abc123
      additionalProperties: false
    XLinkCallbackRequest:
      type: object
      required: [agent_id, handle, profile_url, provider_subject]
      properties:
        agent_id: { type: string }
        handle: { type: string }
        profile_url: { type: string }
        provider_subject: { type: string }
      additionalProperties: false
    ProfileTokenRow:
      type: object
      properties:
        auction_id: { type: string }
        subject_id:
          anyOf:
            - { type: string }
            - { type: "null" }
        agent_id: { type: string }
        agent_name: { type: string }
        symbol: { type: string }
        phase: { type: string, enum: [biddable, live] }
        current_price_usdc:
          anyOf:
            - { type: string }
            - { type: "null" }
        implied_market_cap_usdc:
          anyOf:
            - { type: string }
            - { type: "null" }
        detail_url: { type: string }
        staked_token_amount:
          anyOf:
            - { type: string }
            - { type: "null" }
        staked_usdc_value:
          anyOf:
            - { type: string }
            - { type: "null" }
        claimable_usdc:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    ProfileSnapshot:
      type: object
      required: [status, launched_tokens, staked_tokens]
      properties:
        status: { type: string }
        launched_tokens:
          type: array
          items: { $ref: "#/components/schemas/ProfileTokenRow" }
        staked_tokens:
          type: array
          items: { $ref: "#/components/schemas/ProfileTokenRow" }
        refreshed_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        refresh_started_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        next_manual_refresh_at:
          anyOf:
            - { $ref: "#/components/schemas/DateTime" }
            - { type: "null" }
        error_message:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    ProfileSnapshotEnvelope:
      type: object
      required: [ok, profile]
      properties:
        ok: { type: boolean, enum: [true] }
        profile: { $ref: "#/components/schemas/ProfileSnapshot" }
      additionalProperties: false
