components:
  securitySchemes:
    PrivyBearerToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    PrivySessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
    AgentSessionCookie:
      type: apiKey
      in: cookie
      name: _autolaunch_key
    AgentSiwaHeaders:
      type: apiKey
      in: header
      name: x-siwa-receipt
      description: >
        Signed Agent account header bundle for authenticated agent requests. The current
        shape includes the receipt, signature, signature-input, key ID, timestamp, wallet,
        chain, registry address, token ID, and content digest when the request has a body.
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema: { type: string }
    PlanId:
      name: id
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: id
      in: path
      required: true
      schema: { type: string }
    AuctionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    BidId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SubjectId:
      name: id
      in: path
      required: true
      schema: { type: string }
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string }
    Resource:
      name: resource
      in: path
      required: true
      schema: { type: string }
      description: >
        Canonical contract scope. Job-scoped settlement actions use `strategy`, `auction`,
        `revenue_splitter`, `fee_registry`, `fee_vault`, `hook`, and `vesting`.
    Action:
      name: action
      in: path
      required: true
      schema: { type: string }
      description: >
        Canonical contract action. Settlement actions include `migrate`,
        `recover_failed_auction`, `sweep_currency`, `sweep_unsold_tokens`,
        `accept_ownership`, `sweep_token`, and `release`.
  schemas:
    Address:
      type: string
      pattern: "^0x[a-fA-F0-9]{40}$"
    AutolaunchChainId:
      type: integer
      enum: [84532, 8453]
    DecimalString:
      type: string
    DateTime:
      type: string
      format: date-time
    HexData:
      type: string
      pattern: "^0x[a-fA-F0-9]*$"
    LooseObject:
      type: object
      additionalProperties: true
    PrivySessionCsrf:
      type: object
      required: [ok, csrf_token]
      properties:
        ok: { type: boolean, enum: [true] }
        csrf_token: { type: string }
      additionalProperties: false
    PrivySessionRequest:
      type: object
      required: [wallet_address, wallet_addresses]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        wallet_addresses:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Address" }
        display_name:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrivyXmtpCompleteRequest:
      type: object
      required: [wallet_address, client_id, signature_request_id, signature]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        client_id: { type: string }
        signature_request_id: { type: string }
        signature: { $ref: "#/components/schemas/HexData" }
      additionalProperties: false
    PrivySessionResponse:
      type: object
      required: [ok, human, xmtp]
      properties:
        ok: { type: boolean, enum: [true] }
        human:
          anyOf:
            - type: object
              required: [id, privy_user_id, wallet_address, wallet_addresses, role, xmtp_inbox_id]
              properties:
                id: { type: integer }
                privy_user_id: { type: string }
                wallet_address: { $ref: "#/components/schemas/Address" }
                wallet_addresses:
                  type: array
                  items: { $ref: "#/components/schemas/Address" }
                display_name:
                  anyOf:
                    - { type: string }
                    - { type: "null" }
                role: { type: string }
                xmtp_inbox_id:
                  anyOf:
                    - { type: string }
                    - { type: "null" }
              additionalProperties: false
            - { type: "null" }
        xmtp:
          anyOf:
            - { type: "null" }
            - type: object
              required: [status, inbox_id, wallet_address]
              properties:
                status: { type: string, enum: [ready] }
                inbox_id: { type: string }
                wallet_address: { $ref: "#/components/schemas/Address" }
              additionalProperties: false
            - type: object
              required: [status, inbox_id, wallet_address, client_id, signature_request_id, signature_text]
              properties:
                status: { type: string, enum: [signature_required] }
                inbox_id: { type: "null" }
                wallet_address: { $ref: "#/components/schemas/Address" }
                client_id: { type: string }
                signature_request_id: { type: string }
                signature_text: { type: string }
              additionalProperties: false
      additionalProperties: false
    EmptyRequest:
      type: object
      additionalProperties: false
    AmountRequest:
      type: object
      required: [amount]
      properties:
        amount: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    AgentSessionResponse:
      type: object
      required: [ok, session]
      properties:
        ok: { type: boolean, enum: [true] }
        session:
          anyOf:
            - type: object
              required: [session_id, audience, wallet_address, chain_id, registry_address, token_id, issued_at, expires_at]
              properties:
                session_id: { type: string }
                audience: { type: string, enum: [autolaunch] }
                wallet_address: { $ref: "#/components/schemas/Address" }
                chain_id: { type: string }
                registry_address: { $ref: "#/components/schemas/Address" }
                token_id: { type: string }
                issued_at: { $ref: "#/components/schemas/DateTime" }
                expires_at: { $ref: "#/components/schemas/DateTime" }
              additionalProperties: false
            - { type: "null" }
      additionalProperties: false
    LooseListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    PreparedAction:
      type: object
      properties:
        resource: { type: string }
        action: { type: string }
        chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        target: { $ref: "#/components/schemas/Address" }
        calldata: { $ref: "#/components/schemas/HexData" }
        tx_request:
          $ref: "#/components/schemas/TxRequest"
      additionalProperties: true
    PreparedActionEnvelope:
      type: object
      properties:
        ok: { type: boolean }
        data:
          $ref: "#/components/schemas/PreparedAction"
      additionalProperties: true
    TxRequest:
      type: object
      required: [chain_id, to, value, data]
      properties:
        chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        to: { $ref: "#/components/schemas/Address" }
        value: { $ref: "#/components/schemas/HexData" }
        data: { $ref: "#/components/schemas/HexData" }
      additionalProperties: false
    PrelaunchMetadataDraft:
      type: object
      properties:
        title:
          anyOf:
            - { type: string }
            - { type: "null" }
        subtitle:
          anyOf:
            - { type: string }
            - { type: "null" }
        description:
          anyOf:
            - { type: string }
            - { type: "null" }
        website_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        image_asset_id:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrelaunchPlan:
      type: object
      required:
        - plan_id
        - agent_id
        - token_name
        - token_symbol
        - agent_safe_address
        - minimum_raise_usdc
        - minimum_raise_usdc_raw
      properties:
        plan_id: { type: string }
        agent_id: { type: string }
        token_name: { type: string }
        token_symbol: { type: string }
        agent_safe_address: { $ref: "#/components/schemas/Address" }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        metadata_draft:
          anyOf:
            - { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
        minimum_raise_usdc_raw: { type: string }
        status:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    PrelaunchPlanUpsertRequest:
      type: object
      required:
        - agent_id
        - token_name
        - token_symbol
        - agent_safe_address
        - minimum_raise_usdc
      properties:
        agent_id: { type: string }
        token_name: { type: string }
        token_symbol: { type: string }
        agent_safe_address: { $ref: "#/components/schemas/Address" }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        metadata_draft:
          anyOf:
            - { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    PrelaunchPlanEnvelope:
      type: object
      required: [ok, plan]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
      additionalProperties: false
    PrelaunchPlanListEnvelope:
      type: object
      required: [ok, items]
      properties:
        ok: { type: boolean, enum: [true] }
        items:
          type: array
          items: { $ref: "#/components/schemas/PrelaunchPlan" }
      additionalProperties: false
    PrelaunchValidation:
      type: object
      properties:
        launchable: { type: boolean }
      additionalProperties: true
    PrelaunchPlanValidationEnvelope:
      type: object
      required: [ok, plan, validation]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
        validation: { $ref: "#/components/schemas/PrelaunchValidation" }
      additionalProperties: false
    LaunchPlanRequest:
      type: object
      required: [wallet_address, registry_address, token_id, nonce, message, signature, issued_at]
      properties:
        wallet_address: { $ref: "#/components/schemas/Address" }
        registry_address: { $ref: "#/components/schemas/Address" }
        token_id: { type: string }
        nonce: { type: string }
        message: { type: string }
        signature: { type: string }
        issued_at: { $ref: "#/components/schemas/DateTime" }
      additionalProperties: false
    LaunchRef:
      type: object
      properties:
        job_id: { type: string }
      additionalProperties: true
    LaunchPlanEnvelope:
      type: object
      required: [ok, plan, launch]
      properties:
        ok: { type: boolean, enum: [true] }
        plan: { $ref: "#/components/schemas/PrelaunchPlan" }
        launch: { $ref: "#/components/schemas/LaunchRef" }
      additionalProperties: false
    PrelaunchAssetUploadRequest:
      type: object
      properties:
        source_url:
          anyOf:
            - { type: string }
            - { type: "null" }
        file_name:
          anyOf:
            - { type: string }
            - { type: "null" }
        media_type:
          anyOf:
            - { type: string }
            - { type: "null" }
        content_base64:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    PrelaunchAsset:
      type: object
      properties:
        asset_id: { type: string }
        public_url: { type: string }
      additionalProperties: true
    PrelaunchAssetEnvelope:
      type: object
      required: [ok, asset]
      properties:
        ok: { type: boolean, enum: [true] }
        asset: { $ref: "#/components/schemas/PrelaunchAsset" }
      additionalProperties: false
    PrelaunchMetadataRequest:
      type: object
      required: [metadata]
      properties:
        metadata: { $ref: "#/components/schemas/PrelaunchMetadataDraft" }
      additionalProperties: false
    PrelaunchMetadataPreviewEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
        html:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    LaunchPreviewRequest:
      type: object
      required:
        - agent_id
        - chain_id
        - token_name
        - token_symbol
        - agent_safe_address
        - total_supply
        - minimum_raise_usdc
      properties:
        agent_id: { type: string }
        chain_id: { $ref: "#/components/schemas/AutolaunchChainId" }
        token_name: { type: string }
        token_symbol: { type: string }
        agent_safe_address: { $ref: "#/components/schemas/Address" }
        total_supply: { type: string }
        launch_notes:
          anyOf:
            - { type: string }
            - { type: "null" }
        minimum_raise_usdc: { $ref: "#/components/schemas/DecimalString" }
      additionalProperties: false
    LaunchPreviewEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
      additionalProperties: true
    LaunchCreateRequest:
      allOf:
        - $ref: "#/components/schemas/LaunchPreviewRequest"
        - type: object
          required: [wallet_address, registry_address, token_id, nonce, message, signature, issued_at]
          properties:
            wallet_address: { $ref: "#/components/schemas/Address" }
            registry_address: { $ref: "#/components/schemas/Address" }
            token_id: { type: string }
            nonce: { type: string }
            message: { type: string }
            signature: { type: string }
            issued_at: { $ref: "#/components/schemas/DateTime" }
          additionalProperties: false
    LaunchJob:
      type: object
      properties:
        job_id: { type: string }
        status:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: true
    LaunchJobEnvelope:
      type: object
      required: [ok, job]
      properties:
        ok: { type: boolean, enum: [true] }
        job: { $ref: "#/components/schemas/LaunchJob" }
      additionalProperties: true
    UintLike:
      anyOf:
        - { type: integer, minimum: 0 }
        - { type: string }
        - { type: "null" }
    LifecycleSettlementState:
      type: string
      enum:
        - awaiting_migration
        - awaiting_auction_asset_return
        - failed_auction_recoverable
        - post_recovery_cleanup
        - awaiting_sweeps
        - ownership_acceptance_required
        - settled
        - wait
    LifecycleAction:
      type: string
      enum:
        - migrate
        - auction_sweep_currency
        - auction_sweep_unsold_tokens
        - recover_failed_auction
        - sweep_currency
        - sweep_token
        - accept_revenue_splitter_ownership
        - accept_fee_registry_ownership
        - accept_fee_vault_ownership
        - accept_hook_ownership
        - release_vesting
        - wait
    LifecycleBalanceBucket:
      type: object
      properties:
        token_balance: { $ref: "#/components/schemas/UintLike" }
        usdc_balance: { $ref: "#/components/schemas/UintLike" }
      additionalProperties: false
    LifecycleBalanceSnapshot:
      type: object
      required: [strategy, auction]
      properties:
        strategy: { $ref: "#/components/schemas/LifecycleBalanceBucket" }
        auction: { $ref: "#/components/schemas/LifecycleBalanceBucket" }
      additionalProperties: false
    LifecycleOwnershipCard:
      type: object
      properties:
        owner_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        pending_owner_address:
          anyOf:
            - { $ref: "#/components/schemas/Address" }
            - { type: "null" }
        accepted:
          anyOf:
            - { type: boolean }
            - { type: "null" }
        status:
          anyOf:
            - { type: string }
            - { type: "null" }
      additionalProperties: false
    LifecycleOwnershipStatus:
      type: object
      required: [revenue_splitter, fee_registry, fee_vault, hook, pending_actions, all_accepted]
      properties:
        revenue_splitter: { $ref: "#/components/schemas/LifecycleOwnershipCard" }
        fee_registry: { $ref: "#/components/schemas/LifecycleOwnershipCard" }
        fee_vault: { $ref: "#/components/schemas/LifecycleOwnershipCard" }
        hook: { $ref: "#/components/schemas/LifecycleOwnershipCard" }
        pending_actions:
          type: array
          items: { $ref: "#/components/schemas/LifecycleAction" }
        all_accepted: { type: boolean }
      additionalProperties: false
    LifecycleSummary:
      type: object
      required:
        - current_block
        - settlement_state
        - blocked_reason
        - recommended_action
        - allowed_actions
        - required_actor
        - balance_snapshot
        - ownership_status
      properties:
        current_block:
          anyOf:
            - { type: integer, minimum: 0 }
            - { type: "null" }
        settlement_state: { $ref: "#/components/schemas/LifecycleSettlementState" }
        blocked_reason:
          anyOf:
            - { type: string }
            - { type: "null" }
        recommended_action: { $ref: "#/components/schemas/LifecycleAction" }
        allowed_actions:
          type: array
          items: { $ref: "#/components/schemas/LifecycleAction" }
        required_actor:
          anyOf:
            - { type: string }
            - { type: "null" }
        balance_snapshot: { $ref: "#/components/schemas/LifecycleBalanceSnapshot" }
        ownership_status: { $ref: "#/components/schemas/LifecycleOwnershipStatus" }
      additionalProperties: false
    LifecycleJobEnvelope:
      type: object
      required:
        - ok
        - job
        - auction
        - strategy
        - vesting
        - current_block
        - settlement_state
        - blocked_reason
        - recommended_action
        - allowed_actions
        - required_actor
        - balance_snapshot
        - ownership_status
      properties:
        ok: { type: boolean, enum: [true] }
        job: { $ref: "#/components/schemas/LaunchJob" }
        auction:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        strategy:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        vesting:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        current_block:
          anyOf:
            - { type: integer, minimum: 0 }
            - { type: "null" }
        settlement_state: { $ref: "#/components/schemas/LifecycleSettlementState" }
        blocked_reason:
          anyOf:
            - { type: string }
            - { type: "null" }
        recommended_action: { $ref: "#/components/schemas/LifecycleAction" }
        allowed_actions:
          type: array
          items: { $ref: "#/components/schemas/LifecycleAction" }
        required_actor:
          anyOf:
            - { type: string }
            - { type: "null" }
        balance_snapshot: { $ref: "#/components/schemas/LifecycleBalanceSnapshot" }
        ownership_status: { $ref: "#/components/schemas/LifecycleOwnershipStatus" }
      additionalProperties: false
    LifecycleFinalizeEnvelope:
      type: object
      required:
        - ok
        - job
        - auction
        - strategy
        - vesting
        - current_block
        - settlement_state
        - blocked_reason
        - recommended_action
        - allowed_actions
        - required_actor
        - balance_snapshot
        - ownership_status
        - prepared
      properties:
        ok: { type: boolean, enum: [true] }
        job: { $ref: "#/components/schemas/LaunchJob" }
        auction:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        strategy:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        vesting:
          anyOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        current_block:
          anyOf:
            - { type: integer, minimum: 0 }
            - { type: "null" }
        settlement_state: { $ref: "#/components/schemas/LifecycleSettlementState" }
        blocked_reason:
          anyOf:
            - { type: string }
            - { type: "null" }
        recommended_action: { $ref: "#/components/schemas/LifecycleAction" }
        allowed_actions:
          type: array
          items: { $ref: "#/components/schemas/LifecycleAction" }
        required_actor:
          anyOf:
            - { type: string }
