          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "201":
          description: Bid created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/me/bids:
    get:
      operationId: listMyBids
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      responses:
        "200":
          description: Current user's bids
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseListEnvelope" }
  /api/bids/{id}/exit:
    post:
      operationId: exitBid
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/BidId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Exit prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/bids/{id}/claim:
    post:
      operationId: claimBid
      tags: [market]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/BidId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Claim prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/subjects/{id}:
    get:
      operationId: getSubject
      tags: [subjects]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/SubjectId"
      responses:
        "200":
          description: Subject detail
