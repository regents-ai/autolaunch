            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Bidirectional prepare result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/contracts/admin:
    get:
      operationId: getContractsAdminOverview
