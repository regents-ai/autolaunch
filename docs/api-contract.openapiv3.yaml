openapi: 3.1.0
info:
  title: Autolaunch API Contract
  version: 0.1.0
  description: >
    Source-of-truth HTTP contract for the live Autolaunch backend. This file owns
    Autolaunch launch, prelaunch, lifecycle, market, ENS, contracts, and AgentBook
    routes. Shared Regent staking lives in the shared Regent services contract instead.
tags:
  - name: health
  - name: auth
  - name: agentbook
  - name: launch
  - name: prelaunch
  - name: lifecycle
  - name: market
  - name: subjects
  - name: ens
  - name: contracts
paths:
  /health:
    get:
      operationId: autolaunchHealth
      tags: [health]
      responses:
        "200":
          description: Health
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/agent/siwa/nonce:
    post:
      operationId: autolaunchSiwaNonce
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Nonce
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/agent/siwa/verify:
    post:
      operationId: autolaunchSiwaVerify
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/auth/privy/session:
    post:
      operationId: createPrivySession
      tags: [auth]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
    delete:
      operationId: deletePrivySession
      tags: [auth]
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkEnvelope" }

  /api/agentbook/sessions:
    post:
      operationId: createAgentbookSession
      tags: [agentbook]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/sessions/{id}:
    get:
      operationId: getAgentbookSession
      tags: [agentbook]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/sessions/{id}/submit:
    post:
      operationId: submitAgentbookSession
      tags: [agentbook]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Proof submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/lookup:
    get:
      operationId: lookupAgentbookRegistration
      tags: [agentbook]
      parameters:
        - name: agent_address
          in: query
          required: true
          schema: { $ref: "#/components/schemas/Address" }
        - name: network
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Lookup result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agentbook/verify:
    post:
      operationId: verifyAgentbookHeader
      tags: [agentbook]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/agents:
    get:
      operationId: listAgents
      tags: [launch]
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseListEnvelope" }
  /api/agents/{id}:
    get:
      operationId: getAgent
      tags: [launch]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/agents/{id}/readiness:
    get:
      operationId: getAgentReadiness
      tags: [launch]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent readiness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/prelaunch/plans:
    get:
      operationId: listPrelaunchPlans
      tags: [prelaunch]
      responses:
        "200":
          description: Prelaunch plans
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseListEnvelope" }
    post:
      operationId: createPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/plans/{id}:
    get:
      operationId: getPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Plan detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
    patch:
      operationId: updatePrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/plans/{id}/validate:
    post:
      operationId: validatePrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/plans/{id}/publish:
    post:
      operationId: publishPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Publish result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/plans/{id}/launch:
    post:
      operationId: launchPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Launch started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/assets:
    post:
      operationId: uploadPrelaunchAsset
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Asset uploaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/plans/{id}/metadata:
    post:
      operationId: savePrelaunchMetadata
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Metadata saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/prelaunch/plans/{id}/metadata-preview:
    get:
      operationId: getPrelaunchMetadataPreview
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Metadata preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /api/launch/preview:
    post:
      operationId: previewLaunch
      tags: [launch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Launch preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /api/launch/jobs:
    post:
      operationId: createLaunchJob
      tags: [launch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
