openapi: 3.1.0
info:
  title: Autolaunch API Contract
  version: 0.1.0
  description: >
    Source-of-truth HTTP contract for the live Autolaunch backend. This file owns
    Autolaunch launch, prelaunch, lifecycle, market, ENS, contracts, AgentBook,
    browser auth routes, and Autolaunch-hosted browser Regent staking routes.
    Shared SIWA auth lives in the shared Regent services contract. Agent-signed
    Regent staking route shapes are Platform-owned.
x-regent-capability:
  status: beta
  owner: autolaunch
  money_path: true
  cli_surface: true
  mobile_surface: false
tags:
  - name: health
  - name: auth
  - name: agent-pairings
  - name: agentbook
  - name: launch
  - name: prelaunch
  - name: lifecycle
  - name: market
  - name: trust
  - name: subjects
  - name: ens
  - name: contracts
  - name: regent-staking
  - name: internal-xmtp
x-regent-chat-room-contract:
  owner: autolaunch
  canonical_room_record_fields:
    - room_key
    - xmtp_group_id
    - name
    - status
    - presence_ttl_seconds
    - capacity
  canonical_public_room_key: public-chatbox
  room_authority: Autolaunch owns launch-room membership, session bridge, public-room sync behavior, and launch-room product meaning.
  thread_identifier: xmtp_group_id
  browser_identity_path: /v1/auth/privy/xmtp/complete
  transport_boundary: Autolaunch room setup is product-owned browser auth/session behavior, not a stack-wide room API.
x-autolaunch-rate-limits:
  error:
    status: 429
    schema: "#/components/schemas/RateLimitedError"
    header: retry-after
  public_writes:
    applies_to: ["/v1/app/*", "/v1/agent/*", "/v1/auth/*"]
    default: "60 requests per minute per client IP and route"
  expensive_reads:
    applies_to:
      - "/v1/app/me/*"
      - "/v1/app/agentbook/lookup"
      - "/v1/app/regent/staking/account/*"
      - "/v1/app/contracts/*"
      - "/v1/app/subjects/*"
      - "/v1/app/launch/jobs/*"
      - "/v1/app/prelaunch/plans/*"
      - "/v1/agent/contracts/*"
      - "/v1/agent/subjects/*"
      - "/v1/agent/launch/jobs/*"
      - "/v1/agent/prelaunch/plans/*"
    default: "120 requests per minute per client IP and route"
paths:
  /health:
    get:
      operationId: autolaunchHealth
      tags: [health]
      responses:
        "200":
          description: Health
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /prelaunch-assets/{file}:
    get:
      operationId: getPrelaunchAsset
      tags: [prelaunch]
      parameters:
        - name: file
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Prelaunch asset
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Prelaunch asset not found
  /api/internal/xmtp/shards:
    get:
      operationId: autolaunchInternalXmtpListShards
      tags: [internal-xmtp]
      security: [{ AutolaunchInternalSignature: [], AutolaunchInternalTimestamp: [] }]
      responses:
        "200":
          description: Active mirrored XMTP rooms available to the internal worker
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/InternalXmtpRoomShard" }
                additionalProperties: false
        "401":
          description: Missing or invalid internal request signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/rooms/ensure:
    post:
      operationId: autolaunchInternalXmtpEnsureRoom
      tags: [internal-xmtp]
      security: [{ AutolaunchInternalSignature: [], AutolaunchInternalTimestamp: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InternalXmtpEnsureRoomRequest" }
      responses:
        "200":
          description: Mirrored XMTP room record
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/InternalXmtpRoom" }
                additionalProperties: false
        "401":
          description: Missing or invalid internal request signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Room request invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/messages/ingest:
    post:
      operationId: autolaunchInternalXmtpIngestMessage
      tags: [internal-xmtp]
      security: [{ AutolaunchInternalSignature: [], AutolaunchInternalTimestamp: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InternalXmtpMessageIngestRequest" }
      responses:
        "200":
          description: Saved mirrored message id
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [id]
                    properties:
                      id: { type: integer }
                    additionalProperties: false
                additionalProperties: false
        "401":
          description: Missing or invalid internal request signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Message request invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/commands/lease:
    post:
      operationId: autolaunchInternalXmtpLeaseCommand
      tags: [internal-xmtp]
      security: [{ AutolaunchInternalSignature: [], AutolaunchInternalTimestamp: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_key]
              properties:
                room_key: { type: string }
              additionalProperties: false
      responses:
        "200":
          description: Next membership command for the room, or null
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    anyOf:
                      - { $ref: "#/components/schemas/InternalXmtpMembershipCommand" }
                      - { type: "null" }
                additionalProperties: false
        "401":
          description: Missing or invalid internal request signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Command lease request invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /api/internal/xmtp/commands/{id}/resolve:
    post:
      operationId: autolaunchInternalXmtpResolveCommand
      tags: [internal-xmtp]
      security: [{ AutolaunchInternalSignature: [], AutolaunchInternalTimestamp: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [done, failed]
                error: { type: string }
              additionalProperties: false
      responses:
        "200":
          description: Membership command resolution accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkEnvelope" }
        "401":
          description: Missing or invalid internal request signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Membership command not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Command resolution request invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/auth/privy/csrf:
    get:
      operationId: autolaunchPrivySessionCsrf
      tags: [auth]
      responses:
        "200":
          description: CSRF token for session-backed browser writes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivySessionCsrf" }
  /v1/auth/privy/session:
    post:
      operationId: createPrivySession
      tags: [auth]
      security: [{ PrivyBearerToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrivySessionRequest" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivySessionResponse" }
        "400":
          description: Invalid wallet address
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401":
          description: Missing or invalid Privy bearer token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    delete:
      operationId: deletePrivySession
      tags: [auth]
      security: [{ PrivySessionCookie: [] }]
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkEnvelope" }
  /v1/auth/privy/xmtp/complete:
    post:
      operationId: completePrivyXmtpSetup
      tags: [auth]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrivyXmtpCompleteRequest" }
      responses:
        "200":
          description: XMTP identity saved for the signed-in human
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivySessionResponse" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: XMTP setup request invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/auth/privy/profile:
    get:
      operationId: getPrivySessionProfile
      tags: [auth]
      responses:
        "200":
          description: Current Privy session profile, or an empty session when signed out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivySessionResponse" }

  /v1/auth/agent/session:
    get:
      operationId: getAutolaunchAgentSession
      tags: [auth]
      security: [{ AgentSessionCookie: [] }]
      responses:
        "200":
          description: Current local autolaunch agent session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentSessionResponse" }
    post:
      operationId: createAutolaunchAgentSession
      tags: [auth]
      security: [{ AgentSiwaHeaders: [] }]
      responses:
        "200":
          description: Local autolaunch session created from a shared SIWA receipt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentSessionResponse" }
        "401":
          description: Missing or invalid shared SIWA receipt
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    delete:
      operationId: deleteAutolaunchAgentSession
      tags: [auth]
      security: [{ AgentSessionCookie: [] }]
      responses:
        "200":
          description: Local autolaunch agent session cleared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkEnvelope" }

  /v1/app/regent/staking:
    get:
      operationId: getAppRegentStakingOverview
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      responses:
        "200":
          description: Regent staking overview for the connected browser session, when present
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/regent/staking/account/{address}:
    get:
      operationId: getAppRegentStakingAccount
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - name: address
          in: path
          required: true
          schema: { $ref: "#/components/schemas/Address" }
      responses:
        "200":
          description: Regent staking account state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/regent/staking/stake:
    post:
      operationId: stakeAppRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StakeRequest" }
      responses:
        "200":
          description: Stake transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/regent/staking/unstake:
    post:
      operationId: unstakeAppRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AmountRequest" }
      responses:
        "200":
          description: Unstake transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/regent/staking/claim-usdc:
    post:
      operationId: claimAppRegentStakingUsdc
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: USDC claim transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/regent/staking/claim-regent:
    post:
      operationId: claimAppRegentStakingRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: Regent reward claim transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/regent/staking/claim-and-restake-regent:
    post:
      operationId: claimAndRestakeAppRegentStakingRegent
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "200":
          description: Regent reward claim and restake transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/regent/staking/deposit-usdc/prepare:
    post:
      operationId: prepareAppRegentStakingUsdcDeposit
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegentStakingDepositPrepareRequest" }
      responses:
        "200":
          description: Operator USDC deposit transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "403":
          description: Signed-in wallet is not an allowed Regent staking operator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/regent/staking/withdraw-treasury/prepare:
    post:
      operationId: prepareAppRegentStakingTreasuryWithdrawal
      tags: [regent-staking]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegentStakingTreasuryWithdrawPrepareRequest" }
      responses:
        "200":
          description: Operator treasury withdrawal transaction prepared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegentStakingPreparedActionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "403":
          description: Signed-in wallet is not an allowed Regent staking operator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /v1/app/agentbook/sessions:
    post:
      operationId: createAgentbookSession
      tags: [agentbook]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/agentbook/sessions/{id}:
    get:
      operationId: getAgentbookSession
      tags: [agentbook]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/agentbook/sessions/{id}/submit:
    post:
      operationId: submitAgentbookSession
      tags: [agentbook]
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Proof submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/agentbook/lookup:
    get:
      operationId: lookupAgentbookRegistration
      tags: [agentbook]
      parameters:
        - name: agent_address
          in: query
          required: true
          schema: { $ref: "#/components/schemas/Address" }
        - name: network
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Lookup result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/agentbook/verify:
    post:
      operationId: verifyAgentbookHeader
      tags: [agentbook]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LooseObject" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }

  /v1/app/agents:
    get:
      operationId: listAgents
      tags: [launch]
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseListEnvelope" }
  /v1/app/agents/{id}:
    get:
      operationId: getAgent
      tags: [launch]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LooseObject" }
  /v1/app/agents/{id}/readiness:
    get:
      operationId: getAgentReadiness
      tags: [launch]
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent readiness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentReadinessEnvelope" }

  /v1/app/agent-pairings:
    post:
      operationId: createAgentPairingSession
      tags: [agent-pairings]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmptyRequest" }
      responses:
        "201":
          description: Pairing session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentPairingSessionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/agent-pairings/complete:
    post:
      operationId: completeAgentPairingSession
      tags: [agent-pairings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentPairingCompleteRequest" }
      responses:
        "200":
          description: Pairing completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentPairingSessionEnvelope" }
        "404":
          description: Pairing code not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Pairing cannot be completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: Pairing evidence invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  /v1/app/agent-pairings/{id}:
    get:
      operationId: getAgentPairingSession
      tags: [agent-pairings]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/AgentPairingSessionId"
      responses:
        "200":
          description: Pairing session status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentPairingSessionEnvelope" }
        "401":
          description: Missing signed-in browser session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: Pairing session not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /v1/app/prelaunch/plans:
    get:
      operationId: listPrelaunchPlans
      tags: [prelaunch]
      responses:
        "200":
          description: Prelaunch plans
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanListEnvelope" }
    post:
      operationId: createPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrelaunchPlanUpsertRequest" }
      responses:
        "201":
          description: Plan created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
  /v1/app/prelaunch/plans/{id}:
    get:
      operationId: getPrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Plan detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
    patch:
      operationId: updatePrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrelaunchPlanUpsertRequest" }
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanEnvelope" }
  /v1/app/prelaunch/plans/{id}/validate:
    post:
      operationId: validatePrelaunchPlan
      tags: [prelaunch]
      security: [{ PrivySessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/PlanId"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrelaunchPlanValidationEnvelope" }
  /v1/app/prelaunch/plans/{id}/publish:
    post:
      operationId: publishPrelaunchPlan
