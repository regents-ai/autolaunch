app = "autolaunch-sepolia-dragonfly"
primary_region = "sjc"

[build]
  dockerfile = "autolaunch/Dockerfile.dragonfly"

[[services]]
  protocol = "tcp"
  internal_port = 6379
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 6379
    handlers = []

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
